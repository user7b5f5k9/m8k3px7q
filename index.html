<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#030712"/>
<title>MBTracker Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#030712;--bg2:#0f172a;--card:#111827;--border:#1f2937;--border2:#374151;--text:#f1f5f9;--muted:#9ca3af;--dim:#6b7280;--purple:#7c3aed;--purple2:#a78bfa;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--mono:'DM Mono','Courier New',monospace;--sans:'DM Sans',system-ui,sans-serif}
html,body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}

/* LAYOUT */
#app{display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between}
#topbar-left{display:flex;align-items:center;gap:10px}
#logo{width:28px;height:28px;background:var(--purple);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
#appname{font-family:var(--sans);font-weight:700;font-size:14px}
#save-ind{font-family:var(--sans);font-size:11px;color:var(--dim);display:flex;align-items:center;gap:4px}
#portfolio-val{font-family:var(--mono);font-weight:700;font-size:15px}
#nav-desk{display:none;align-items:center;gap:2px}
#nav-mob{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px;border:none;background:transparent;color:var(--dim);font-family:var(--sans);font-size:10px;position:relative;transition:color .15s}
.nav-btn.active{color:var(--purple2)}
.nav-btn svg{width:18px;height:18px}
.nav-desk-btn{display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:var(--sans);font-size:12px;font-weight:500;transition:all .15s;position:relative}
.nav-desk-btn:hover{background:var(--card);color:var(--text)}
.nav-desk-btn.active{background:var(--card);color:var(--text)}
.badge-dot{position:absolute;top:-1px;right:-1px;background:var(--yellow);color:#000;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:var(--sans)}
#main{max-width:1100px;margin:0 auto;padding:16px;padding-bottom:90px;width:100%}
@media(min-width:768px){#nav-desk{display:flex}#nav-mob{display:none}#main{padding:20px;padding-bottom:24px}}

/* CARDS & GRID */
.card{background:var(--card);border:1px solid var(--border);border-radius:11px}
.card-click{cursor:pointer;transition:border-color .15s}
.card-click:hover{border-color:var(--border2)}
.p4{padding:16px}.p5{padding:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.g4{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g6{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:500px){.g4{grid-template-columns:repeat(4,1fr)}.g6{grid-template-columns:repeat(6,1fr)}}
.acct-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(min-width:540px){.acct-grid{grid-template-columns:repeat(3,1fr)}}
.cs2{grid-column:span 2}
.sp2>*+*{margin-top:8px}
.sp3>*+*{margin-top:12px}
.sp4>*+*{margin-top:16px}
.sp5>*+*{margin-top:20px}
.row{display:flex;align-items:center}
.roww{display:flex;align-items:center;flex-wrap:wrap}
.jb{justify-content:space-between}
.gap1{gap:4px}.gap2{gap:8px}.gap3{gap:12px}
.flex1{flex:1}.mn0{min-width:0}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* TYPOGRAPHY */
.t-white{color:var(--text)}.t-muted{color:var(--muted)}.t-dim{color:var(--dim)}
.t-green{color:var(--green)}.t-red{color:var(--red)}.t-yellow{color:var(--yellow)}.t-purple{color:var(--purple2)}
.t-xs{font-size:11px}.t-sm{font-size:13px}.t-lg{font-size:18px}.t-xl{font-size:20px}.t-2xl{font-size:24px}.t-4xl{font-size:34px}
.sans{font-family:var(--sans)}.mono{font-family:var(--mono)}
.bold{font-weight:700}.med{font-weight:500}
.upper{text-transform:uppercase}.cap{text-transform:capitalize}
.track{letter-spacing:.06em}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;font-weight:500;border-radius:7px;border:1px solid;transition:all .15s;cursor:pointer;font-size:13px;padding:7px 13px;font-family:var(--sans)}
.btn-sm{font-size:11px;padding:5px 9px}
.btn-p{background:var(--purple);border-color:var(--purple);color:#fff}
.btn-p:hover{background:#6d28d9}
.btn-s{background:var(--card);border-color:var(--border2);color:#e5e7eb}
.btn-s:hover{background:var(--border2)}
.btn-d{background:#450a0a;border-color:#7f1d1d;color:var(--red)}
.btn-d:hover{background:#7f1d1d}
.btn-ok{background:#052e16;border-color:#14532d;color:var(--green)}
.btn-ok:hover{background:#14532d}
.btn-g{background:transparent;border-color:transparent;color:var(--muted)}
.btn-g:hover{background:var(--card)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* FORM ELEMENTS */
.lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-family:var(--sans)}
input[type=text],input[type=number],input[type=date],select,input[type=email]{background:#1f2937;border:1px solid var(--border2);border-radius:7px;padding:8px 11px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border-color .15s;font-family:var(--mono)}
input:focus,select:focus{border-color:var(--purple)}
select option{background:#1f2937}
input[type=checkbox]{width:15px;height:15px;accent-color:var(--purple)}
input[type=radio]{width:13px;height:13px;accent-color:var(--purple)}
input[type=color]{border:none;padding:0;width:34px;height:28px;border-radius:4px;cursor:pointer}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;border:1px solid;font-family:var(--sans)}
.bdg-g{background:#052e16;color:var(--green);border-color:#14532d}
.bdg-r{background:#450a0a;color:var(--red);border-color:#7f1d1d}
.bdg-y{background:#422006;color:var(--yellow);border-color:#92400e}
.bdg-v{background:#2e1065;color:var(--purple2);border-color:#4c1d95}
.bdg-gr{background:#1f2937;color:var(--muted);border-color:var(--border2)}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px;background:rgba(0,0,0,.85);overflow-y:auto}
.dialog{background:var(--card);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:500px;animation:fi .15s ease}
.dialog.wide{max-width:660px}
.dlg-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);border-radius:14px 14px 0 0;z-index:5}
.dlg-body{padding:15px}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;font-size:12px;border-collapse:collapse}
th{text-align:left;padding:9px 11px;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);font-weight:500;font-family:var(--sans)}
td{padding:8px 11px;border-bottom:1px solid rgba(31,41,55,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(31,41,55,.4)}

/* MISC */
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.page{animation:fi .15s ease}
.warn-box{background:#422006;border:1px solid #92400e;border-radius:9px;padding:13px}
.info-box{background:#2e1065;border:1px solid #4c1d95;border-radius:9px;padding:13px;text-align:center}
.snote{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:11px;font-size:12px;color:var(--dim);font-family:var(--sans)}
.tab-bar{display:flex;gap:3px;background:#1f2937;border-radius:7px;padding:3px;width:fit-content;margin-bottom:16px}
.tab-btn{padding:5px 11px;border-radius:5px;font-size:11px;font-weight:500;border:none;cursor:pointer;color:var(--muted);background:transparent;font-family:var(--sans);transition:all .15s}
.tab-btn.active{background:var(--border2);color:var(--text)}
.filter-bar{display:flex;gap:3px;background:#1f2937;border-radius:7px;padding:3px}
.filter-btn{padding:4px 11px;border-radius:5px;font-size:11px;font-weight:500;border:none;cursor:pointer;color:var(--muted);background:transparent;font-family:var(--sans);text-transform:capitalize;transition:all .15s}
.filter-btn.active{background:var(--border2);color:var(--text)}
.settle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.settle-btn{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px;border-radius:9px;border:1px solid;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.sw{background:#052e16;border-color:#14532d;color:var(--green)}.sw:hover{background:#14532d}
.sl{background:#450a0a;border-color:#7f1d1d;color:var(--red)}.sl:hover{background:#7f1d1d}
.sv{background:#1f2937;border-color:var(--border2);color:var(--muted)}.sv:hover{background:var(--border2)}
.acct-layout{display:flex;flex-direction:column;gap:14px}
@media(min-width:900px){.acct-layout{flex-direction:row}}
.acct-sb{flex-shrink:0}
@media(min-width:900px){.acct-sb{width:195px}}
.acct-item{display:flex;align-items:center;gap:9px;padding:9px;border-radius:9px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.acct-item:hover{background:#1f2937}
.acct-item.active{background:#1f2937;border-color:var(--border2)}
.cr{background:#1f2937;border-radius:9px;padding:13px;text-align:center}

/* MINI CHART */
.chart-wrap{width:100%;height:130px;position:relative;overflow:hidden}
.chart-wrap svg{width:100%;height:100%}

/* OPEN BET ALERT */
.open-alert{display:flex;align-items:center;gap:8px;background:#422006;border:1px solid #92400e;border-radius:9px;padding:10px 14px;cursor:pointer;transition:background .15s}
.open-alert:hover{background:#78350f}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="topbar-left">
      <div id="logo">⚡</div>
      <span id="appname" class="sans bold">MBTracker</span>
      <span id="save-ind" class="sans t-xs t-dim">✓ Saved</span>
    </div>
    <nav id="nav-desk"></nav>
    <div id="portfolio-val" class="mono bold">£0.00</div>
  </div>
  <div id="main"></div>
  <nav id="nav-mob"></nav>
</div>

<script>
// ── STORAGE
var SK='mbtracker_v3';
function load(){try{var r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return null;}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch(e){}}

// ── UTILS
function fmt(v,c){c=c||'£';return(v<0?'-':'')+c+Math.abs(v).toFixed(2);}
function fmtPct(v){return(v>=0?'+':'')+v.toFixed(2)+'%';}
function uid(){return Math.random().toString(36).slice(2,10);}
function today(){return new Date().toISOString().slice(0,10);}
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==='class')e.className=attrs[k];
    else if(k==='html')e.innerHTML=attrs[k];
    else if(k.startsWith('on'))e[k]=attrs[k];
    else e.setAttribute(k,attrs[k]);
  });
  if(children){
    var arr=Array.isArray(children)?children:[children];
    arr.forEach(function(c){if(c!=null&&c!==false)e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  }
  return e;
}
function div(cls,children,attrs){var a=attrs||{};a.class=cls;return el('div',a,children);}
function span(cls,text){return el('span',{'class':cls},[text]);}
function amtSpan(v,c){var cls=v>0?'t-green mono':v<0?'t-red mono':'t-dim mono';return el('span',{'class':cls},[fmt(v,c)]);}

// ── CALC FUNCTIONS
function calcLay(bo,lo,bs,comm,isFree,snr){
  isFree=!!isFree;snr=snr!==false;
  var c=comm/100;
  // SNR free bet: only profit portion needs covering (bo-1)*bs
  // SR free bet & normal: full return needs covering bo*bs
  var ls=isFree&&snr?((bo-1)*bs)/(lo-c):(bo*bs)/(lo-c);
  var ll=+(ls*(lo-1)).toFixed(2);
  var lw=+(ls*(1-c)).toFixed(2);
  var ql;
  if(isFree&&snr){ql=+lw;}          // SNR: free bet profit = lay winnings
  else if(isFree&&!snr){ql=lw-bs;}  // SR: profit = lay winnings minus stake
  else{ql=lw-bs;}                    // Normal: qual loss = lay winnings minus back stake
  return{layStake:+ls.toFixed(2),layLiability:ll,qualLoss:+ql.toFixed(2)};
}
function calcEW(bo,lo,ewp,bs,c){
  var po=(bo-1)/ewp+1,plo=(lo-1)/ewp+1;
  var wc=calcLay(bo,lo,bs/2,c),pc=calcLay(po,plo,bs/2,c);
  return{wc:wc,pc:pc,total:+(wc.layLiability+pc.layLiability).toFixed(2)};
}
function calcDutch(sels){
  var tot=sels.reduce(function(a,s){return a+(s.odds>1?1/(s.odds-1):0);},0);
  return sels.map(function(s){return{id:s.id,name:s.name,odds:s.odds,stake:tot>0?+(100/(tot*(s.odds-1))).toFixed(2):0};});
}

// ── SEED DATA
function buildSeed(){
  var now=Date.now();
  function d(n){return new Date(now-n*86400000).toISOString().slice(0,10);}
  var accounts=[
    {id:'bank',name:'Cash Bank',type:'bank',balance:0,color:'#6366f1'},
    {id:'betfair',name:'Betfair Exchange',type:'exchange',balance:0,color:'#f59e0b'},
    {id:'bet365',name:'Bet365',type:'bookmaker',balance:0,color:'#10b981'},
    {id:'skybet',name:'Sky Bet',type:'bookmaker',balance:0,color:'#3b82f6'},
    {id:'wh',name:'William Hill',type:'bookmaker',balance:0,color:'#ef4444'},
  ];
  var txns=[];var bal={bank:0,betfair:0,bet365:0,skybet:0,wh:0};
  function add(aid,type,amount,desc,date,ref){
    bal[aid]=+(bal[aid]+amount).toFixed(2);
    txns.push({id:uid(),accountId:aid,type:type,amount:amount,desc:desc,date:date,runningBalance:bal[aid],refId:ref||null});
  }
  add('bank','deposit',500,'Initial deposit',d(30));
  add('bank','transfer-out',-150,'Transfer to Bet365',d(29));add('bet365','transfer-in',150,'Deposit from Cash Bank',d(29));
  add('bank','transfer-out',-100,'Transfer to Betfair',d(29));add('betfair','transfer-in',100,'Deposit from Cash Bank',d(29));
  add('bank','transfer-out',-100,'Transfer to Sky Bet',d(28));add('skybet','transfer-in',100,'Deposit from Cash Bank',d(28));
  add('bank','transfer-out',-80,'Transfer to William Hill',d(27));add('wh','transfer-in',80,'Deposit from Cash Bank',d(27));
  var b1=uid();
  add('bet365','back-stake',-20,'Back: Arsenal @ 2.10 [Arsenal vs Chelsea]',d(25),b1);
  add('betfair','lay-liability',-22,'Lay liability: Arsenal @ 2.20',d(25),b1);
  add('bet365','back-win',42,'Back win: Arsenal vs Chelsea',d(24),b1);
  add('betfair','lay-loss',-22,'Lay loss: Arsenal vs Chelsea',d(24),b1);
  add('betfair','commission',-0.44,'Commission: Arsenal vs Chelsea',d(24),b1);
  var b2=uid();
  add('skybet','back-stake',-25,'Back: Man City @ 1.80 [Man City vs Liverpool]',d(22),b2);
  add('betfair','lay-liability',-19.5,'Lay liability: Man City @ 1.85',d(22),b2);
  add('skybet','back-loss',0,'Back lost: Man City vs Liverpool',d(21),b2);
  add('betfair','lay-win',19.5,'Lay win: Man City vs Liverpool',d(21),b2);
  add('betfair','commission',-0.39,'Commission: Man City vs Liverpool',d(21),b2);
  var b3=uid();
  add('wh','free-bet',30,'Free bet credited: Welcome offer',d(20),b3);
  add('wh','back-stake',-30,'Free bet: Spurs @ 3.00 [Spurs vs Wolves]',d(20),b3);
  add('betfair','lay-liability',-44,'Lay liability: Spurs @ 3.20',d(20),b3);
  add('wh','back-win',60,'Free bet win: Spurs vs Wolves',d(19),b3);
  add('betfair','lay-loss',-44,'Lay loss: Spurs vs Wolves',d(19),b3);
  add('betfair','commission',-0.88,'Commission: Spurs vs Wolves',d(19),b3);
  var b4=uid();
  add('bet365','back-stake',-30,'Back: Chelsea @ 2.50 [Chelsea vs Newcastle]',d(3),b4);
  add('betfair','lay-liability',-37.5,'Lay liability: Chelsea @ 2.60',d(3),b4);
  var b5=uid();
  add('skybet','back-stake',-15,'Back: BTTS Yes @ 1.90 [Leeds vs Ipswich]',d(1),b5);
  add('betfair','lay-liability',-13.5,'Lay liability: BTTS @ 1.95',d(1),b5);
  accounts.forEach(function(a){a.balance=bal[a.id]||0;});
  var bets=[
    {id:b1,event:'Arsenal vs Chelsea',market:'Match Result',selection:'Arsenal',backAccountId:'bet365',layAccountId:'betfair',backOdds:2.10,layOdds:2.20,backStake:20,layStake:19.09,layLiability:22,commission:2,qualLoss:-0.69,status:'settled',result:'back-win',date:d(25),settledDate:d(24),isFree:false,notes:''},
    {id:b2,event:'Man City vs Liverpool',market:'Match Result',selection:'Man City',backAccountId:'skybet',layAccountId:'betfair',backOdds:1.80,layOdds:1.85,backStake:25,layStake:24.32,layLiability:20.67,commission:2,qualLoss:-0.82,status:'settled',result:'back-loss',date:d(22),settledDate:d(21),isFree:false,notes:''},
    {id:b3,event:'Spurs vs Wolves',market:'Match Result',selection:'Spurs',backAccountId:'wh',layAccountId:'betfair',backOdds:3.00,layOdds:3.20,backStake:30,layStake:28.85,layLiability:63.46,commission:2,qualLoss:14.32,status:'settled',result:'back-win',date:d(20),settledDate:d(19),isFree:true,notes:'WH Welcome free bet SNR'},
    {id:b4,event:'Chelsea vs Newcastle',market:'Match Result',selection:'Chelsea',backAccountId:'bet365',layAccountId:'betfair',backOdds:2.50,layOdds:2.60,backStake:30,layStake:28.85,layLiability:46.15,commission:2,qualLoss:-1.15,status:'open',result:null,date:d(3),settledDate:null,isFree:false,notes:''},
    {id:b5,event:'Leeds vs Ipswich',market:'BTTS',selection:'Yes',backAccountId:'skybet',layAccountId:'betfair',backOdds:1.90,layOdds:1.95,backStake:15,layStake:14.62,layLiability:13.86,commission:2,qualLoss:-0.45,status:'open',result:null,date:d(1),settledDate:null,isFree:false,notes:''},
  ];
  return{accounts:accounts,txns:txns,bets:bets};
}

// ── SVG ICONS
var ICONS={
  dashboard:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
  bets:'<path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>',
  accounts:'<path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>',
  calculator:'<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>',

// ── MINI SVG CHART
function miniChart(data,currency){
  if(!data||data.length<2)return null;
  var vals=data.map(function(d){return d.profit;});
  var min=Math.min.apply(null,vals),max=Math.max.apply(null,vals);
  var range=max-min||1;
  var w=300,h=100,pad=4;
  var pts=vals.map(function(v,i){
    var x=pad+(i/(vals.length-1))*(w-pad*2);
    var y=pad+(1-(v-min)/range)*(h-pad*2);
    return x+','+y;
  });
  var pathD='M '+pts.join(' L ');
  var fillD=pathD+' L '+(w-pad)+','+(h-pad)+' L '+pad+','+(h-pad)+' Z';
  var color=vals[vals.length-1]>=0?'#4ade80':'#f87171';
  var wrap=div('card p4');
  wrap.innerHTML='<div class="sans t-sm t-muted bold" style="margin-bottom:10px">Cumulative Profit</div>';
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+w+' '+h);
  svg.style.cssText='width:100%;height:120px';
  // zero line
  if(min<0&&max>0){
    var zy=pad+(1-(0-min)/range)*(h-pad*2);
    var zl=document.createElementNS('http://www.w3.org/2000/svg','line');
    zl.setAttribute('x1',pad);zl.setAttribute('y1',zy);zl.setAttribute('x2',w-pad);zl.setAttribute('y2',zy);
    zl.setAttribute('stroke','#374151');zl.setAttribute('stroke-width','1');
    svg.appendChild(zl);
  }
  // fill
  var fill=document.createElementNS('http://www.w3.org/2000/svg','path');
  fill.setAttribute('d',fillD);fill.setAttribute('fill',color);fill.setAttribute('opacity','0.15');
  svg.appendChild(fill);
  // line
  var line=document.createElementNS('http://www.w3.org/2000/svg','path');
  line.setAttribute('d',pathD);line.setAttribute('fill','none');line.setAttribute('stroke',color);line.setAttribute('stroke-width','2');
  svg.appendChild(line);
  // dots
  data.forEach(function(d,i){
    var x=pad+(i/(vals.length-1))*(w-pad*2);
    var y=pad+(1-(vals[i]-min)/range)*(h-pad*2);
    var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r','3');
    c.setAttribute('fill',color);svg.appendChild(c);
    // tooltip on hover via title
    var t=document.createElementNS('http://www.w3.org/2000/svg','title');
    t.textContent=d.date+': '+fmt(d.profit,currency);
    c.appendChild(t);
  });
  wrap.appendChild(svg);
  return wrap;
}

// ── MODAL HELPER
var modalStack=[];
function showModal(content,wide){
  var overlay=div('overlay');
  var dialog=div('dialog'+(wide?' wide':''));
  dialog.appendChild(content);
  overlay.appendChild(dialog);
  overlay.onclick=function(e){if(e.target===overlay)closeModal();};
  document.body.appendChild(overlay);
  modalStack.push(overlay);
}
function closeModal(){
  if(modalStack.length){document.body.removeChild(modalStack.pop());}
}
function closeAllModals(){while(modalStack.length)document.body.removeChild(modalStack.pop());}

function doSettle(betId,result){
  var c=state.settings.currency;
  var bet=state.bets.find(function(b){return b.id===betId;});if(!bet)return;
  var desc='['+bet.event+'] '+bet.selection,date=today(),comm=bet.commission/100;
  if(result==='back-win'){
    postTxn(bet.backAccountId,'back-win',+(bet.backStake*bet.backOdds).toFixed(2),'Back win – '+desc,date,betId);
    postTxn(bet.layAccountId,'lay-loss',0,'Lay loss – '+desc,date,betId);
    var ca=+(bet.layStake*comm).toFixed(2);if(ca>0)postTxn(bet.layAccountId,'commission',-ca,'Commission – '+desc,date,betId);
  }else if(result==='back-loss'){
    postTxn(bet.backAccountId,'back-loss',0,'Back lost – '+desc,date,betId);
    postTxn(bet.layAccountId,'lay-win',+(bet.layLiability+bet.layStake).toFixed(2),'Lay win – '+desc,date,betId);
    var ca2=+(bet.layStake*comm).toFixed(2);if(ca2>0)postTxn(bet.layAccountId,'commission',-ca2,'Commission – '+desc,date,betId);
  }else if(result==='void'){
    if(!bet.isFree)postTxn(bet.backAccountId,'back-win',bet.backStake,'Void refund (back) – '+desc,date,betId);
    postTxn(bet.layAccountId,'lay-win',bet.layLiability,'Void refund (lay) – '+desc,date,betId);
  }
  bet.status='settled';bet.result=result;bet.settledDate=date;
  queueSave();
}

function postTxn(aid,type,amount,desc,date,refId){
  var ac=state.accounts.find(function(a){return a.id===aid;});if(!ac)return;
  ac.balance=+(ac.balance+amount).toFixed(2);
  var run=state.txns.filter(function(t){return t.accountId===aid;}).reduce(function(s,t){return s+t.amount;},0);

}

  function calcDutchRes(){
    res.innerHTML='';
    var valid=sels.filter(function(s){return parseFloat(s.odds)>1;});
    if(valid.length<2)return;
    var calc=calcDutch(valid.map(function(s){return{id:s.id,name:s.name,odds:parseFloat(s.odds)};}));
    var t=parseFloat(tgI.input.value)||100;var ts=calc.reduce(function(a,c2){return a+c2.stake;},0);var sc=t/ts;
    calc.forEach(function(r){var row=div('row jb',null,{style:'background:#1f2937;border-radius:7px;padding:8px 13px'});row.innerHTML='<span class="sans t-sm" style="color:#d1d5db">'+r.name+' @ '+r.odds+'</span><span class="mono bold t-white">'+fmt(+(r.stake*sc).toFixed(2),c)+'</span>';res.appendChild(row);});
    var tot=div('row jb',null,{style:'background:#2e1065;border:1px solid #4c1d95;border-radius:7px;padding:8px 13px'});tot.innerHTML='<span class="sans med t-purple">Total Staked</span><span class="mono bold t-purple">'+fmt(+(calc.reduce(function(a,r){return a+r.stake*sc;},0)).toFixed(2),c)+'</span>';res.appendChild(tot);
  }
  var addBtn=btn('Add Selection','btn-s btn-sm','plus',function(){sels.push({id:uid(),name:'Selection '+(sels.length+1),odds:''});renderSels();});w.appendChild(addBtn);
  tgI.input.oninput=calcDutchRes;
  renderSels();
  return w;
}

// ── SETTINGS PAGE
function renderSettings(){
  var c=state.settings.currency;
  var pg=div('page sp4',null,{style:'max-width:500px'});

  // General
  var gc=div('card p5');
  gc.innerHTML='<div class="sans bold t-muted" style="font-size:14px;margin-bottom:12px">General Settings</div>';
  var cg=div('sp3');
  var curI=inp('Currency Symbol',state.settings.currency);curI.wrap.style.width='110px';cg.appendChild(curI.wrap);
  var comI=inp('Default Commission (%)',state.settings.commission,'number','0.1');comI.wrap.style.width='200px';cg.appendChild(comI.wrap);
  curI.input.oninput=function(){state.settings.currency=curI.input.value;queueSave();updatePortfolioVal();};
  comI.input.oninput=function(){state.settings.commission=parseFloat(comI.input.value)||0;queueSave();};
  gc.appendChild(cg);pg.appendChild(gc);

  // Data
  var dc=div('card p5');
  dc.innerHTML='<div class="sans bold t-muted" style="font-size:14px;margin-bottom:12px">Data & Backup</div>';
  var ds=div('sp4');
  var ed=div('');ed.innerHTML='<div class="sans t-xs t-dim" style="margin-bottom:8px">Export full backup — use this to transfer data to another device</div>';
  var exBtn=btn('Export JSON Backup','btn-s','download',function(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download='mbtracker-backup.json';a.click();URL.revokeObjectURL(u);});
  ed.appendChild(exBtn);ds.appendChild(ed);
  var id=div('');id.innerHTML='<div class="sans t-xs t-dim" style="margin-bottom:8px">Import from a previous JSON backup</div>';
  var impLbl=el('label',{'style':'display:inline-flex;align-items:center;gap:7px;padding:6px 13px;background:#1f2937;border:1px solid #374151;border-radius:7px;cursor:pointer;font-size:13px;color:#e5e7eb;font-family:var(--sans)'});
  impLbl.appendChild(ico('upload',13));impLbl.appendChild(document.createTextNode('Choose JSON file'));
  var impFile=el('input',{type:'file',accept:'.json',style:'display:none'});
  impFile.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!confirm((d.accounts?d.accounts.length:0)+' accounts, '+(d.txns?d.txns.length:0)+' transactions, '+(d.bets?d.bets.length:0)+' bets — import and replace current data?'))return;if(d.accounts)state.accounts=d.accounts;if(d.txns)state.txns=d.txns;if(d.bets)state.bets=d.bets;if(d.settings)state.settings=d.settings;queueSave();navigate('dashboard');}catch(err){alert('Invalid JSON file.');}};r.readAsText(f);};
  impLbl.appendChild(impFile);id.appendChild(impLbl);ds.appendChild(id);
  var dd=div('',null,{style:'border-top:1px solid #1f2937;padding-top:14px'});
  dd.innerHTML='<div class="sans t-xs t-dim" style="margin-bottom:8px">Danger zone</div>';
  var clrBtn=btn('Clear All Data & Reset','btn-d btn-sm','trash',function(){
  if(!confirm('Clear ALL data and start fresh with zero balances?'))return;
  state={accounts:[{id:'bank',name:'Cash Bank',type:'bank',balance:0,color:'#6366f1'},{id:'betfair',name:'Betfair Exchange',type:'exchange',balance:0,color:'#f59e0b'},{id:'bet365',name:'Bet365',type:'bookmaker',balance:0,color:'#10b981'},{id:'skybet',name:'Sky Bet',type:'bookmaker',balance:0,color:'#3b82f6'},{id:'wh',name:'William Hill',type:'bookmaker',balance:0,color:'#ef4444'}],txns:[],bets:[],settings:{currency:'£',commission:2}};
  save(state);
  page='dashboard';
  render();
});
  dd.appendChild(clrBtn);ds.appendChild(dd);
  dc.appendChild(ds);pg.appendChild(dc);

  // Summary
  var sc2=div('card p5');
  sc2.innerHTML='<div class="sans bold t-muted" style="font-size:14px;margin-bottom:12px">Summary</div><div class="g3" style="text-align:center"><div><div class="bold t-white t-2xl">'+state.accounts.length+'</div><div class="sans t-xs t-dim">Accounts</div></div><div><div class="bold t-white t-2xl">'+state.bets.length+'</div><div class="sans t-xs t-dim">Total Bets</div></div><div><div class="bold t-white t-2xl">'+state.txns.length+'</div><div class="sans t-xs t-dim">Transactions</div></div></div>';
  pg.appendChild(sc2);

  var note=div('snote');note.innerHTML='<span style="font-weight:600;color:#a78bfa">Auto-save active.</span> Data is stored in your browser\'s localStorage on this device only. Use Export JSON to transfer to another device.';
  pg.appendChild(note);
  return pg;
}

// ── NAV
var NAV_ITEMS=[{id:'dashboard',label:'Dashboard',icon:'dashboard'},{id:'bets',label:'Bets',icon:'bets'},{id:'accounts',label:'Accounts',icon:'accounts'},{id:'calculators',label:'Calculators',icon:'calculator'},{id:'settings',label:'Settings',icon:'settings'}];

function buildNav(){
  var desk=document.getElementById('nav-desk');
  var mob=document.getElementById('nav-mob');
  desk.innerHTML='';mob.innerHTML='';
  var openCount=state.bets.filter(function(b){return b.status==='open';}).length;
  NAV_ITEMS.forEach(function(n){
    // desktop
    var db=el('button',{'class':'nav-desk-btn'+(page===n.id?' active':'')});
    db.appendChild(ico(n.icon,13));db.appendChild(document.createTextNode(n.label));
    if(n.id==='bets'&&openCount>0){var bd=div('badge-dot');bd.textContent=openCount;db.appendChild(bd);}
    db.onclick=function(id){return function(){navigate(id);};}(n.id);
    desk.appendChild(db);
    // mobile
    var mb=el('button',{'class':'nav-btn'+(page===n.id?' active':'')});
    mb.appendChild(ico(n.icon,18,page===n.id?'#a78bfa':'#6b7280'));
    var lbl=el('span',{},[n.label]);mb.appendChild(lbl);
    if(n.id==='bets'&&openCount>0){var bd2=div('badge-dot');bd2.textContent=openCount;mb.appendChild(bd2);}
    mb.onclick=function(id){return function(){navigate(id);};}(n.id);
    mob.appendChild(mb);
  });
}

function updatePortfolioVal(){
  var total=state.accounts.reduce(function(a,b){return a+b.balance;},0);
  var pv=document.getElementById('portfolio-val');
  pv.textContent=fmt(total,state.settings.currency);
  pv.style.color=total<0?'#f87171':'#f1f5f9';
}

// ── MAIN RENDER
function render(){
  closeAllModals();
  var main=document.getElementById('main');
  main.innerHTML='';
  var content;
  if(page==='dashboard')content=renderDashboard();
  else if(page==='bets')content=renderBets();
  else if(page==='accounts')content=renderAccounts();
  else if(page==='calculators')content=renderCalculators();
  else if(page==='settings')content=renderSettings();
  if(content)main.appendChild(content);
  buildNav();
  updatePortfolioVal();
}

// ── BOOT
initState();
render();
</script>
</body>
</html>
