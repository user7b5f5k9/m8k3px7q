*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#030712;color:#f1f5f9;font-family:'DM Mono','Courier New',monospace;min-height:100vh}
.sans{font-family:'DM Sans',system-ui,sans-serif}
input,select,button{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}

.card{background:#111827;border:1px solid #1f2937;border-radius:12px}

.btn{display:inline-flex;align-items:center;gap:6px;font-weight:500;border-radius:8px;border:1px solid;transition:all 0.15s;cursor:pointer;font-size:13px;padding:7px 14px}
.btn-sm{font-size:11px;padding:5px 10px}
.btn-p{background:#7c3aed;border-color:#7c3aed;color:#fff}.btn-p:hover{background:#6d28d9}
.btn-s{background:#1f2937;border-color:#374151;color:#e5e7eb}.btn-s:hover{background:#374151}
.btn-d{background:#450a0a;border-color:#7f1d1d;color:#f87171}.btn-d:hover{background:#7f1d1d}
.btn-ok{background:#052e16;border-color:#14532d;color:#4ade80}.btn-ok:hover{background:#14532d}
.btn-g{background:transparent;border-color:transparent;color:#9ca3af}.btn-g:hover{background:#1f2937}

input[type=text],input[type=number],input[type=date],select{background:#1f2937;border:1px solid #374151;border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;width:100%;outline:none;transition:border-color 0.15s}

.ap{color:#4ade80;font-family:'DM Mono',monospace}

var SK='mbtracker_v2';
function loadSt(){try{var r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}return null;}
function saveSt(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch(e){}}

function fmt(v,c){c=c||'£';return(v<0?'-':'')+c+Math.abs(v).toFixed(2);}
function fmtPct(v){return(v>=0?'+':'')+v.toFixed(2)+'%';}
function uid(){return Math.random().toString(36).slice(2,10);}
function today(){return new Date().toISOString().slice(0,10);}

function calcLay(bo,lo,bs,comm,isFree,snr){
  isFree=!!isFree;snr=snr!==false;
  var c=comm/100;
  var ls=isFree&&snr?(bo*bs)/(lo-c):isFree&&!snr?((bo-1)*bs)/(lo-1+c):(bo*bs)/(lo-c);
  var ll=ls*(lo-1);
  var bw=isFree?(snr?(bo-1)*bs:bo*bs):bo*bs-bs;
  var lw=ls*(1-c);
  var ql=isFree?-(bw-lw):-(bs-lw);
  return{layStake:+ls.toFixed(2),layLiability:+ll.toFixed(2),qualLoss:+ql.toFixed(2)};
}
function calcEW(bo,lo,ewp,bs,c){
  var po=(bo-1)/ewp+1,plo=(lo-1)/ewp+1;
  var wc=calcLay(bo,lo,bs/2,c),pc=calcLay(po,plo,bs/2,c);
  return{wc:wc,pc:pc,total:wc.layLiability+pc.layLiability};
}
function calcDutch(sels){
  var tot=sels.reduce(function(a,s){return a+(s.odds>1?1/(s.odds-1):0);},0);
  return sels.map(function(s){return Object.assign({},s,{stake:tot>0?+(100/(tot*(s.odds-1))).toFixed(2):0});});
}

function buildSeed(){
  var now=Date.now();
  function d(n){return new Date(now-n*86400000).toISOString().slice(0,10);}
  var accounts=[
    {id:'bank',name:'Cash Bank',type:'bank',balance:0,color:'#6366f1'},
    {id:'betfair',name:'Betfair Exchange',type:'exchange',balance:0,color:'#f59e0b'},
    {id:'bet365',name:'Bet365',type:'bookmaker',balance:0,color:'#10b981'},
    {id:'skybet',name:'Sky Bet',type:'bookmaker',balance:0,color:'#3b82f6'},
    {id:'wh',name:'William Hill',type:'bookmaker',balance:0,color:'#ef4444'},
  ];
  var txns=[];var bal={bank:0,betfair:0,bet365:0,skybet:0,wh:0};
  function add(aid,type,amount,desc,date,refId){
    bal[aid]=+(bal[aid]+amount).toFixed(2);
    txns.push({id:uid(),accountId:aid,type:type,amount:amount,desc:desc,date:date,runningBalance:bal[aid],refId:refId||null});
  }
  add('bank','deposit',500,'Initial deposit',d(30));
  add('bank','transfer-out',-150,'Transfer to Bet365',d(29));add('bet365','transfer-in',150,'Deposit from Cash Bank',d(29));

  add('bank','transfer-out',-100,'Transfer to Sky Bet',d(28));add('skybet','transfer-in',100,'Deposit from Cash Bank',d(28));
  add('bank','transfer-out',-80,'Transfer to William Hill',d(27));add('wh','transfer-in',80,'Deposit from Cash Bank',d(27));
  var b1=uid();
  add('bet365','back-stake',-20,'Back: Arsenal @ 2.10 [Arsenal vs Chelsea]',d(25),b1);
  add('betfair','lay-liability',-22,'Lay liability: Arsenal @ 2.20 [Arsenal vs Chelsea]',d(25),b1);
  add('bet365','back-win',42,'Back win: Arsenal [Arsenal vs Chelsea]',d(24),b1);
  add('betfair','lay-loss',-22,'Lay loss [Arsenal vs Chelsea]',d(24),b1);
  add('betfair','commission',-0.44,'Commission [Arsenal vs Chelsea]',d(24),b1);
  var b2=uid();

  add('betfair','lay-liability',-19.5,'Lay liability: Man City @ 1.85',d(22),b2);
  add('skybet','back-loss',0,'Back lost: Man City [Man City vs Liverpool]',d(21),b2);
  add('betfair','lay-win',19.5,'Lay win: Man City [Man City vs Liverpool]',d(21),b2);
  add('betfair','commission',-0.39,'Commission [Man City vs Liverpool]',d(21),b2);
  var b3=uid();
  add('wh','free-bet',30,'Free bet credited: Welcome offer',d(20),b3);
  add('wh','back-stake',-30,'Free bet: Spurs @ 3.00 [Spurs vs Wolves]',d(20),b3);
  add('betfair','lay-liability',-44,'Lay liability: Spurs @ 3.20 [Spurs vs Wolves]',d(20),b3);
  add('wh','back-win',60,'Free bet win: Spurs [Spurs vs Wolves]',d(19),b3);
  add('betfair','lay-loss',-44,'Lay loss [Spurs vs Wolves]',d(19),b3);
  add('betfair','commission',-0.88,'Commission [Spurs vs Wolves]',d(19),b3);
  var b4=uid();
  add('bet365','back-stake',-30,'Back: Chelsea @ 2.50 [Chelsea vs Newcastle]',d(3),b4);
  add('betfair','lay-liability',-37.5,'Lay liability: Chelsea @ 2.60 [Chelsea vs Newcastle]',d(3),b4);
  var b5=uid();
  add('skybet','back-stake',-15,'Back: BTTS Yes @ 1.90 [Leeds vs Ipswich]',d(1),b5);
  add('betfair','lay-liability',-13.5,'Lay liability: BTTS @ 1.95 [Leeds vs Ipswich]',d(1),b5);
  accounts.forEach(function(a){a.balance=bal[a.id]||0;});
  var bets=[
    {id:b1,event:'Arsenal vs Chelsea',market:'Match Result',selection:'Arsenal',backAccountId:'bet365',layAccountId:'betfair',backOdds:2.10,layOdds:2.20,backStake:20,layStake:19.09,layLiability:22,commission:2,qualLoss:-0.69,status:'settled',result:'back-win',date:d(25),settledDate:d(24),isFree:false,notes:''},
    {id:b2,event:'Man City vs Liverpool',market:'Match Result',selection:'Man City',backAccountId:'skybet',layAccountId:'betfair',backOdds:1.80,layOdds:1.85,backStake:25,layStake:24.32,layLiability:20.67,commission:2,qualLoss:-0.82,status:'settled',result:'back-loss',date:d(22),settledDate:d(21),isFree:false,notes:''},
    {id:b3,event:'Spurs vs Wolves',market:'Match Result',selection:'Spurs',backAccountId:'wh',layAccountId:'betfair',backOdds:3.00,layOdds:3.20,backStake:30,layStake:28.85,layLiability:63.46,commission:2,qualLoss:14.32,status:'settled',result:'back-win',date:d(20),settledDate:d(19),isFree:true,notes:'WH Welcome free bet SNR'},
    {id:b4,event:'Chelsea vs Newcastle',market:'Match Result',selection:'Chelsea',backAccountId:'bet365',layAccountId:'betfair',backOdds:2.50,layOdds:2.60,backStake:30,layStake:28.85,layLiability:46.15,commission:2,qualLoss:-1.15,status:'open',result:null,date:d(3),settledDate:null,isFree:false,notes:''},
    {id:b5,event:'Leeds vs Ipswich',market:'BTTS',selection:'Yes',backAccountId:'skybet',layAccountId:'betfair',backOdds:1.90,layOdds:1.95,backStake:15,layStake:14.62,layLiability:13.86,commission:2,qualLoss:-0.45,status:'open',result:null,date:d(1),settledDate:null,isFree:false,notes:''},
